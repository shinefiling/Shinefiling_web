name: Shinefiling Full Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Node.js for frontend
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # 3️⃣ Setup Java 17 for backend (Updated from 11 as per pom.xml)
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4️⃣ Install Maven
    - name: Install Maven (Optional if using setup-java with Maven support)
      run: sudo apt update && sudo apt install maven -y

    # 5️⃣ Build backend (Maven)
    - name: Build Backend
      run: |
        cd shinefiling-backend
        mvn clean package

    # 6️⃣ Build frontend (npm + dist)
    - name: Build Frontend
      run: |
        cd shinefiling-frontend
        npm install
        npm run build

    # 7️⃣ Transfer Files (JAR and Frontend dist)
    - name: Copy JAR to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "shinefiling-backend/target/shinefiling-backend-0.0.1-SNAPSHOT.jar"
        target: "/home/prakash/Shinefiling_web/"

    - name: Copy Frontend to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "shinefiling-frontend/dist/*"
        target: "/home/prakash/Shinefiling_transfer/"

    # 8️⃣ Deploy via SSH with PEM key
    - name: Deploy to Server
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # Use password for sudo commands
          export PASS="${{ secrets.SERVER_PASSWORD }}"

          # Stop backend service (if exists)
          echo "$PASS" | sudo -S systemctl stop shinefiling-backend || true

          # 1. Update Frontend via Apache
          echo "$PASS" | sudo -S mkdir -p /var/www/shinefiling
          echo "$PASS" | sudo -S rm -rf /var/www/shinefiling/*
          
          # DEBUG: List transfer folder to verify contents
          echo "Listing transfer folder contents:"
          ls -R /home/prakash/Shinefiling_transfer/
          
          # Move files to Apache
          echo "$PASS" | sudo -S cp -r /home/prakash/Shinefiling_transfer/shinefiling-frontend/dist/* /var/www/shinefiling/
          echo "$PASS" | sudo -S chown -R $USER:$USER /var/www/shinefiling
          echo "$PASS" | sudo -S chmod -R 755 /var/www/shinefiling
          
          # Cleanup transfer folder
          echo "$PASS" | sudo -S rm -rf /home/prakash/Shinefiling_transfer/*
          
          # 2. Reload Apache
          echo "$PASS" | sudo -S a2enmod proxy proxy_http rewrite || true
          echo "$PASS" | sudo -S systemctl restart apache2

          # 3. Manage Backend Service
          cd /home/prakash/Shinefiling_web/shinefiling-backend/target/
          echo "$PASS" | sudo -S systemctl daemon-reload
          echo "$PASS" | sudo -S systemctl enable shinefiling-backend
          
          # Forcefully kill any process on 8080
          echo "$PASS" | sudo -S fuser -k 8080/tcp || true
          
          echo "$PASS" | sudo -S systemctl restart shinefiling-backend

          # 4. Wait for backend to start
          echo "Waiting for backend to initialize..."
          sleep 5

          # Optional: renew SSL
          echo "$PASS" | sudo -S certbot renew --quiet || true
