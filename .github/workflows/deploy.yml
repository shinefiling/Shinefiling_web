name: Shinefiling Full Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Node.js for frontend
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # 3️⃣ Setup Java 17 for backend (Updated from 11 as per pom.xml)
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4️⃣ Install Maven
    - name: Install Maven (Optional if using setup-java with Maven support)
      run: sudo apt update && sudo apt install maven -y

    # 5️⃣ Build backend (Maven)
    - name: Build Backend
      run: |
        cd shinefiling-backend
        mvn clean package

    # 6️⃣ Build frontend (npm + dist)
    - name: Build Frontend
      run: |
        cd shinefiling-frontend
        npm install
        npm run build

    # 7️⃣ Transfer Files (JAR and Frontend dist)
    - name: Copy JAR to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "shinefiling-backend/target/shinefiling-backend-0.0.1-SNAPSHOT.jar"
        target: "/home/prakash/Shinefiling_web/"

    - name: Copy Frontend to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "shinefiling-frontend/dist/*"
        target: "/home/prakash/Shinefiling_web/shinefiling-frontend/"

    # 8️⃣ Deploy via SSH with PEM key
    - name: Deploy to Server
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # Stop backend service (if exists)
          sudo systemctl stop shinefiling-backend || true

          # Move artifacts to final destination
          sudo mkdir -p /home/prakash/Shinefiling_web/shinefiling-backend/target/
          cp /home/prakash/Shinefiling_web/shinefiling-backend/target/shinefiling-backend-0.0.1-SNAPSHOT.jar /home/prakash/Shinefiling_web/shinefiling-backend/target/ || true

          # Copy frontend dist to Apache
          sudo mkdir -p /var/www/shinefiling
          sudo rm -rf /var/www/shinefiling/*
          sudo cp -r /home/prakash/Shinefiling_web/shinefiling-frontend/dist/* /var/www/shinefiling/
          sudo chown -R ubuntu:ubuntu /var/www/shinefiling || sudo chown -R $USER:$USER /var/www/shinefiling
          sudo chmod -R 755 /var/www/shinefiling

          # Enable Apache proxy modules if not already
          sudo a2enmod proxy proxy_http rewrite || true

          # Reload Apache
          sudo systemctl reload apache2

          # Start backend service
          sudo systemctl daemon-reload
          sudo systemctl enable shinefiling-backend
          sudo systemctl restart shinefiling-backend

          # Optional: renew SSL (if Certbot installed)
          sudo certbot renew --quiet || true
