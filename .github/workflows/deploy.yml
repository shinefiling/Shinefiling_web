name: Shinefiling Full Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Setup Node.js for frontend
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'

    # 3️⃣ Setup Java 17 for backend (Updated from 11 as per pom.xml)
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # 4️⃣ Install Maven
    - name: Install Maven (Optional if using setup-java with Maven support)
      run: sudo apt update && sudo apt install maven -y

    # 5️⃣ Build backend (Maven)
    - name: Build Backend
      run: |
        cd shinefiling-backend
        mvn clean package

    # 6️⃣ Build frontend (npm + dist)
    - name: Build Frontend
      run: |
        cd shinefiling-frontend
        npm install
        npm run build

    # 7️⃣ Transfer Files (JAR and Frontend dist)
    - name: Copy JAR to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "shinefiling-backend/target/shinefiling-backend-0.0.1-SNAPSHOT.jar"
        target: "/home/prakash/Shinefiling_web/"
        strip_components: 0 # Keeps "shinefiling-backend/target/"

    - name: Copy Frontend to Server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        source: "shinefiling-frontend/dist/*"
        target: "/home/prakash/Shinefiling_transfer/"
        strip_components: 2 # Strips "shinefiling-frontend/dist/"

    # 8️⃣ Deploy via SSH
    - name: Deploy to Server
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          export PASS="${{ secrets.SERVER_PASSWORD }}"
          
          # 1. Update Frontend
          echo "$PASS" | sudo -S mkdir -p /var/www/shinefiling
          echo "$PASS" | sudo -S rm -rf /var/www/shinefiling/*
          echo "$PASS" | sudo -S cp -r /home/prakash/Shinefiling_transfer/* /var/www/shinefiling/
          echo "$PASS" | sudo -S chown -R www-data:www-data /var/www/shinefiling
          echo "$PASS" | sudo -S chmod -R 755 /var/www/shinefiling
          
          # Cleanup transfer folder
          rm -rf /home/prakash/Shinefiling_transfer/*
          
          # 2. Restart Apache
          echo "$PASS" | sudo -S systemctl restart apache2

          # 3. Manage Backend
          # Kill any manual java process to avoid port conflict
          echo "$PASS" | sudo -S fuser -k 8080/tcp || true
          
          # Restart the systemd service
          echo "$PASS" | sudo -S systemctl daemon-reload
          echo "$PASS" | sudo -S systemctl restart shinefiling-backend
          echo "$PASS" | sudo -S systemctl enable shinefiling-backend
          
          echo "Deployment successful!"
